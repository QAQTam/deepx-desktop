name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:win
      - uses: actions/upload-artifact@v4
        with:
          name: deepx-desktop-windows-x64
          path: |
            release/*-Setup.exe
            release/*.blockmap
          if-no-files-found: error
      - if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release create "${GITHUB_REF_NAME}" release/*-Setup.exe release/*.blockmap --verify-tag --generate-notes --title "DeepX Desktop ${GITHUB_REF_NAME}"

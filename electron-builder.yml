appId: com.deepx.desktop
productName: DeepX

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true

extraResources:
  - from: build/sidecar/deepx-daemon.exe
    to: deepx-daemon.exe
  - from: build/sidecar/daemon-manifest.json
    to: daemon-manifest.json

win:
  executableName: DeepX
  target:
    - target: nsis
      arch:
        - x64
  artifactName: DeepX-${version}-${arch}-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: DeepX
